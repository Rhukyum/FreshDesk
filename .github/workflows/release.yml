name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version à publier (ex: 1.0.0)'
        required: true
        default: '1.0.0'

# Permissions globales minimales — chaque job déclare ce dont il a besoin
permissions:
  contents: read

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=v$VERSION" >> $GITHUB_ENV

      - name: Sync package.json version
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "$RELEASE_TAG" | grep -q "refs/tags/$RELEASE_TAG$"; then
            echo "Tag $RELEASE_TAG already exists remotely, skipping tag creation."
          else
            git tag "$RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi

      - name: Generate release notes
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --no-merges --pretty=format:"%s" | head -30)
          else
            COMMITS=$(git log --no-merges --pretty=format:"%s" "${PREV_TAG}..HEAD")
          fi

          FEATS=""
          FIXES=""
          OTHER=""

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            # Remove conventional commit prefix for cleaner display
            clean=$(echo "$msg" | sed -E 's/^(feat|fix|chore|refactor|perf|style|docs|test|ci|build)(\([^)]*\))?[:\!] *//')
            # Capitalize first letter
            clean="$(echo "${clean:0:1}" | tr '[:lower:]' '[:upper:]')${clean:1}"
            if echo "$msg" | grep -qiE "^feat"; then
              FEATS="${FEATS}- ${clean}\n"
            elif echo "$msg" | grep -qiE "^fix"; then
              FIXES="${FIXES}- ${clean}\n"
            else
              OTHER="${OTHER}- ${clean}\n"
            fi
          done <<< "$COMMITS"

          {
            echo "## Quoi de neuf dans la v${VERSION} ?"
            echo ""
            if [ -n "$FEATS" ]; then
              echo "### ✨ Nouveautés"
              echo -e "$FEATS"
            fi
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Corrections"
              echo -e "$FIXES"
            fi
            if [ -n "$OTHER" ]; then
              echo "### 🔧 Autres changements"
              echo -e "$OTHER"
            fi
          } > release_notes.md

      - name: Package & Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Publish release (non-draft + release notes)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release edit "$RELEASE_TAG" \
            --draft=false \
            --notes-file release_notes.md
